<!--
  Tikkies Tools — Alert Box Widget (กล่องแจ้งเตือนกลางจอ สำหรับ Browser Source ใน OBS)

  แสดงแจ้งเตือน: ของขวัญ / กดติดตาม / สมัครสมาชิก / แชร์ไลฟ์ และ alert จากระบบ Actions
  พื้นหลังโปร่งใส — เพิ่มเป็น Browser Source ได้เลย (แนะนำ 1920x1080)

  URL: http://localhost:21213/widgets/alerts.html

  พารามิเตอร์ (ต่อท้าย URL เช่น ?shares=1&mindiamonds=10):
    ?gifts=0          ปิดแจ้งเตือนของขวัญ            (ค่าเริ่มต้น: เปิด)
    ?follows=0        ปิดแจ้งเตือนกดติดตาม           (ค่าเริ่มต้น: เปิด)
    ?subs=0           ปิดแจ้งเตือนสมัครสมาชิก        (ค่าเริ่มต้น: เปิด)
    ?shares=1         เปิดแจ้งเตือนแชร์ไลฟ์          (ค่าเริ่มต้น: ปิด)
    ?mindiamonds=N    ขั้นต่ำเพชรของขวัญที่จะแจ้งเตือน (ไม่ใส่ = ใช้ค่าจากตั้งค่า overlay.alertMinDiamonds)
    ?duration=N       วินาทีที่แสดงต่อ 1 แจ้งเตือน     (ไม่ใส่ = ใช้ overlay.alertDurationSec, ต่ำสุด 2.5 วิ)
    ?sound=0          ปิดเสียงทั้งหมด
    ?debug=1          แสดงปุ่มลอยสำหรับยิง event ทดสอบ
    ?host= / ?port=   กรณีเปิดจากเครื่อง/พอร์ตอื่น (ค่าเริ่มต้น localhost:21213)

  พฤติกรรม:
    - event 'alert' จาก Actions แสดงเสมอ (ไม่ถูกกรองด้วย mindiamonds)
    - ของขวัญนับเฉพาะตอนจบคอมโบ (repeatEnd === true) ตามสัญญากลาง
    - คิวแสดงทีละใบ ใบละอย่างน้อย 2.5 วิ (ถ้ามีคิวรอจะตัดจบเร็วขึ้นเพื่อเล่นต่อเนื่อง)
    - เพชรรวม >= 100 มีเอฟเฟกต์ confetti; alert ที่มี soundUrl เล่นไฟล์เสียงนั้น
      ไม่มีก็เล่นเสียง chime สังเคราะห์สั้นๆ ด้วย WebAudio
-->
<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tikkies — Alerts</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    background: transparent; /* สำหรับใช้เป็น Browser Source ใน OBS */
    width: 100%; height: 100%;
    overflow: hidden;
    font-family: -apple-system, 'Helvetica Neue', 'Thonburi', sans-serif;
    -webkit-font-smoothing: antialiased;
  }

  /* เวทีกลางจอ */
  #stage {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    pointer-events: none;
    z-index: 10;
  }

  /* ชั้นเอฟเฟกต์ confetti */
  #fx {
    position: fixed; inset: 0;
    pointer-events: none;
    overflow: hidden;
    z-index: 20;
  }
  .confetti {
    position: absolute; left: 50%; top: 48%;
    will-change: transform, opacity;
  }

  /* ---- การ์ดแจ้งเตือน ---- */
  .card {
    /* สี accent ตั้งผ่าน CSS variable (JS override ได้ต่อใบ) */
    --a: #fe2c55;
    --a2: #25f4ee;
    --a-glow: rgba(254, 44, 85, 0.35);
    --a-faint: rgba(254, 44, 85, 0.15);
    --a-border: rgba(254, 44, 85, 0.65);

    position: relative;
    min-width: 320px;
    max-width: min(560px, 86vw);
    padding: 72px 42px 30px;
    text-align: center;
    border-radius: 24px;
    box-shadow:
      0 0 0 1.5px var(--a-border),
      0 0 36px var(--a-glow),
      0 22px 60px rgba(0, 0, 0, 0.55);
    animation: cardIn 0.55s cubic-bezier(0.34, 1.56, 0.64, 1) both;
  }
  .card.out {
    animation: cardOut 0.42s cubic-bezier(0.5, 0, 0.75, 0.2) both;
  }

  /* พื้นกระจกมืดโปร่งแสง (แยกชั้นเพื่อ overflow:hidden ให้แสง shine โดยไม่คลิปรูป) */
  .glass {
    position: absolute; inset: 0;
    border-radius: inherit;
    overflow: hidden;
    background: linear-gradient(165deg, rgba(28, 28, 34, 0.84), rgba(18, 18, 22, 0.72));
    -webkit-backdrop-filter: blur(16px) saturate(1.3);
    backdrop-filter: blur(16px) saturate(1.3);
    box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.07), inset 0 0 40px var(--a-faint);
    z-index: 0;
  }
  /* แสงกวาดผ่านการ์ดหนึ่งครั้งตอนโผล่ */
  .shine {
    position: absolute; top: -20%; bottom: -20%;
    left: -80%; width: 55%;
    background: linear-gradient(105deg, transparent, rgba(255, 255, 255, 0.14), transparent);
    transform: skewX(-18deg);
    animation: sweep 1.1s ease 0.35s both;
  }

  /* รูปของขวัญ / avatar วงกลมคร่อมขอบบนการ์ด */
  .media {
    position: absolute; top: 0; left: 50%;
    transform: translate(-50%, -52%);
    width: 104px; height: 104px;
    border-radius: 50%;
    object-fit: contain;
    background: #1c1c22;
    padding: 8px;
    z-index: 2;
    animation:
      mediaIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) 0.08s both,
      ringPulse 2.2s ease-in-out 0.6s infinite;
  }
  .media.avatar { object-fit: cover; padding: 0; }
  .media.emoji {
    display: flex; align-items: center; justify-content: center;
    font-size: 52px; line-height: 1; padding: 0;
  }

  /* ข้อความหลัก — ตัวหนาใหญ่ ไล่เฉดสี accent */
  .main {
    position: relative; z-index: 1;
    font-size: clamp(24px, 5vw, 38px);
    font-weight: 800;
    line-height: 1.28;
    letter-spacing: 0.2px;
    word-break: break-word;
    background: linear-gradient(92deg, var(--a), var(--a2));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    -webkit-text-fill-color: transparent;
    filter: drop-shadow(0 2px 12px var(--a-faint));
    animation: riseIn 0.45s ease 0.14s both;
  }
  .sub {
    position: relative; z-index: 1;
    margin-top: 8px;
    font-size: 16px;
    font-weight: 500;
    color: #b9b9c6;
    word-break: break-word;
    animation: riseIn 0.45s ease 0.2s both;
  }
  /* ป้ายยอดเพชร */
  .pill {
    position: relative; z-index: 1;
    display: inline-flex; align-items: center; gap: 6px;
    margin-top: 14px;
    padding: 6px 16px;
    border-radius: 999px;
    font-size: 17px; font-weight: 700;
    color: #25f4ee;
    background: rgba(37, 244, 238, 0.1);
    border: 1px solid rgba(37, 244, 238, 0.45);
    box-shadow: 0 0 16px rgba(37, 244, 238, 0.22);
    animation: riseIn 0.45s ease 0.26s both;
  }

  @keyframes cardIn {
    from { opacity: 0; transform: scale(0.55) translateY(46px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }
  @keyframes cardOut {
    to { opacity: 0; transform: translateY(-36px) scale(0.9); filter: blur(2px); }
  }
  @keyframes mediaIn {
    from { opacity: 0; transform: translate(-50%, -52%) scale(0.25); }
    to   { opacity: 1; transform: translate(-50%, -52%) scale(1); }
  }
  @keyframes ringPulse {
    0%, 100% { box-shadow: 0 0 0 3px var(--a), 0 0 22px var(--a-glow); }
    50%      { box-shadow: 0 0 0 3px var(--a), 0 0 42px var(--a-glow), 0 0 64px var(--a-faint); }
  }
  @keyframes riseIn {
    from { opacity: 0; transform: translateY(14px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes sweep {
    to { left: 130%; }
  }

  /* ---- ปุ่มทดสอบ (?debug=1) ---- */
  #debug {
    position: fixed; right: 14px; bottom: 14px;
    display: none; align-items: center; gap: 8px;
    z-index: 50;
    pointer-events: auto;
  }
  #debug.show { display: flex; }
  #debug button {
    font-family: inherit;
    font-size: 13px; font-weight: 600;
    color: #ececf1;
    background: #1c1c22;
    border: 1px solid #fe2c55;
    border-radius: 10px;
    padding: 8px 13px;
    cursor: pointer;
  }
  #debug button:hover { background: #26262e; }
  #debug button:active { transform: scale(0.96); }
  #wsdot {
    width: 10px; height: 10px; border-radius: 50%;
    background: #f43f5e;
  }
  #wsdot.on { background: #2dd4a8; box-shadow: 0 0 8px rgba(45, 212, 168, 0.8); }
</style>
</head>
<body>
  <div id="stage"></div>
  <div id="fx"></div>

  <div id="debug">
    <span id="wsdot" title="สถานะการเชื่อมต่อ"></span>
    <button id="btn-gift">🎁 ทดสอบของขวัญ</button>
    <button id="btn-big">💎 ของขวัญใหญ่</button>
    <button id="btn-follow">✨ ทดสอบติดตาม</button>
  </div>

  <script src="common/widget.js"></script>
  <script>
  (function () {
    var params = TikkiesWidget.params;
    var esc = TikkiesWidget.escapeHtml;

    // ---- อ่านพารามิเตอร์ ----
    var showGifts   = params.get('gifts')   !== '0'; // ค่าเริ่มต้นเปิด
    var showFollows = params.get('follows') !== '0'; // ค่าเริ่มต้นเปิด
    var showSubs    = params.get('subs')    !== '0'; // ค่าเริ่มต้นเปิด
    var showShares  = params.get('shares')  === '1'; // ค่าเริ่มต้นปิด
    var soundOn     = params.get('sound')   !== '0';
    var debugOn     = params.get('debug')   === '1';

    // ?mindiamonds= / ?duration= ล็อกค่าไว้ ไม่ให้ snapshot ทับ
    var minLocked = params.get('mindiamonds') != null;
    var durLocked = false;
    var defaults = { durationSec: 6, minDiamonds: 0, accent: '#fe2c55', accent2: '#25f4ee' };
    // ?accent=rrggbb ล็อกสีหลักจาก URL (หน้าแต่งธีมในแอปใช้) — snapshot จะไม่ทับ
    var accentLocked = false;
    var pAccent = params.get('accent');
    if (pAccent && /^[0-9a-f]{6}$/i.test(pAccent)) { defaults.accent = '#' + pAccent; accentLocked = true; }
    if (minLocked) {
      var mp = Number(params.get('mindiamonds'));
      defaults.minDiamonds = isFinite(mp) && mp > 0 ? mp : 0;
    }
    var dp = Number(params.get('duration'));
    if (isFinite(dp) && dp > 0) { defaults.durationSec = dp; durLocked = true; }

    var MIN_MS = 2500;                 // แสดงอย่างน้อย 2.5 วิ ต่อใบ
    var OUT_MS = 460;                  // ความยาว animation ขาออก (+เผื่อ)
    var GAP_MS = 220;                  // เว้นจังหวะระหว่างใบ
    var SAFE_URL = /^(https?:\/\/|data:image\/|\.?\/)/i;
    var HEX = /^#([0-9a-f]{3}|[0-9a-f]{6})$/i;

    var stageEl = document.getElementById('stage');
    var fxEl = document.getElementById('fx');

    // ---- เครื่องมือสี ----
    function hexToRgb(hex) {
      var m = HEX.exec(String(hex || '').trim());
      if (!m) return null;
      var h = m[1];
      if (h.length === 3) h = h[0] + h[0] + h[1] + h[1] + h[2] + h[2];
      var n = parseInt(h, 16);
      return { r: (n >> 16) & 255, g: (n >> 8) & 255, b: n & 255 };
    }
    function rgba(hex, a) {
      var c = hexToRgb(hex) || hexToRgb(defaults.accent) || { r: 254, g: 44, b: 85 };
      return 'rgba(' + c.r + ',' + c.g + ',' + c.b + ',' + a + ')';
    }
    // ผสมกับสีขาว t (0-1) เพื่อทำปลายเกรเดียนต์เวลามี accent กำหนดเอง
    function lighten(hex, t) {
      var c = hexToRgb(hex);
      if (!c) return defaults.accent2;
      var r = Math.round(c.r + (255 - c.r) * t);
      var g = Math.round(c.g + (255 - c.g) * t);
      var b = Math.round(c.b + (255 - c.b) * t);
      return 'rgb(' + r + ',' + g + ',' + b + ')';
    }

    // ---- เสียง ----
    var actx = null;
    function audioCtx() {
      if (!actx) {
        try { actx = new (window.AudioContext || window.webkitAudioContext)(); }
        catch (e) { actx = null; }
      }
      if (actx && actx.state === 'suspended') {
        try { actx.resume(); } catch (e) {}
      }
      return actx;
    }
    // chime สังเคราะห์ 3 โน้ต (ของขวัญใหญ่ = 4 โน้ตไต่ขึ้น)
    function chime(big) {
      var c = audioCtx();
      if (!c) return;
      var notes = big
        ? [523.25, 659.25, 783.99, 1046.5]   // C5 E5 G5 C6
        : [659.25, 783.99, 1046.5];          // E5 G5 C6
      var t0 = c.currentTime + 0.02;
      for (var i = 0; i < notes.length; i++) {
        var o = c.createOscillator();
        var g = c.createGain();
        o.type = 'sine';
        o.frequency.value = notes[i];
        var st = t0 + i * 0.11;
        var decay = big ? 0.8 : 0.6;
        g.gain.setValueAtTime(0.0001, st);
        g.gain.exponentialRampToValueAtTime(0.2, st + 0.02);
        g.gain.exponentialRampToValueAtTime(0.0001, st + decay);
        o.connect(g);
        g.connect(c.destination);
        o.start(st);
        o.stop(st + decay + 0.05);
      }
    }
    function playSound(item) {
      if (!soundOn) return;
      if (item.soundUrl) {
        try {
          var a = new Audio(item.soundUrl);
          a.volume = 1;
          var pr = a.play();
          if (pr && pr.catch) pr.catch(function () {});
        } catch (e) {}
        return;
      }
      chime(!!item.big);
    }
    // ปลดล็อก AudioContext ตาม autoplay policy (คลิกที่หน้า 1 ครั้งในเบราว์เซอร์จริง)
    document.addEventListener('click', function () { audioCtx(); });

    // ---- Confetti (เพชรรวม >= 100) ----
    function burstConfetti(accent) {
      if (typeof fxEl.animate !== 'function' &&
          typeof document.createElement('div').animate !== 'function') return;
      if (fxEl.childElementCount > 160) return; // กันสแปมจนหน่วง
      var colors = [accent, defaults.accent2, '#ffd700', '#ffffff', '#ff7a9c'];
      for (var i = 0; i < 48; i++) {
        var p = document.createElement('div');
        p.className = 'confetti';
        var size = 6 + Math.random() * 7;
        p.style.width = size + 'px';
        p.style.height = (Math.random() < 0.4 ? size : size * 0.45) + 'px';
        p.style.background = colors[i % colors.length];
        p.style.borderRadius = Math.random() < 0.4 ? '50%' : '2px';
        fxEl.appendChild(p);

        var ang = Math.random() * Math.PI * 2;
        var dist = 120 + Math.random() * 260;
        var dx = Math.cos(ang) * dist;
        var dyUp = Math.sin(ang) * dist * 0.55 - (90 + Math.random() * 170);
        var fall = 280 + Math.random() * 320;
        var rot = Math.random() * 720 - 360;
        var dur = 1000 + Math.random() * 800;

        var anim = p.animate([
          { transform: 'translate(0,0) rotate(0deg)', opacity: 1 },
          { transform: 'translate(' + (dx * 0.8) + 'px,' + dyUp + 'px) rotate(' + (rot * 0.6) + 'deg)', opacity: 1, offset: 0.45 },
          { transform: 'translate(' + dx + 'px,' + (dyUp + fall) + 'px) rotate(' + rot + 'deg)', opacity: 0 }
        ], { duration: dur, easing: 'cubic-bezier(0.2, 0.7, 0.3, 1)', fill: 'forwards' });

        (function (el, an, ms) {
          var removed = false;
          var rm = function () { if (!removed) { removed = true; el.remove(); } };
          if (an) an.onfinish = rm;
          setTimeout(rm, ms + 250); // เผื่อ onfinish ไม่ยิง
        })(p, anim, dur);
      }
    }

    // ---- วาดการ์ด ----
    function render(item) {
      var card = document.createElement('div');
      card.className = 'card';

      // accent ต่อใบ: จาก alert data > snapshot > ค่าเริ่มต้น
      var custom = item.accent && HEX.test(item.accent);
      var a = custom ? item.accent : defaults.accent;
      var a2 = custom ? lighten(a, 0.55) : defaults.accent2;
      card.style.setProperty('--a', a);
      card.style.setProperty('--a2', a2);
      card.style.setProperty('--a-glow', rgba(a, 0.35));
      card.style.setProperty('--a-faint', rgba(a, 0.15));
      card.style.setProperty('--a-border', rgba(a, 0.65));

      var mediaHtml;
      if (item.imageUrl && SAFE_URL.test(item.imageUrl)) {
        mediaHtml = '<img class="media' + (item.avatar ? ' avatar' : '') + '" alt="" ' +
                    'referrerpolicy="no-referrer" src="' + esc(item.imageUrl) + '">';
      } else {
        mediaHtml = '<div class="media emoji">' + esc(item.icon || '🔔') + '</div>';
      }

      card.innerHTML =
        '<div class="glass"><div class="shine"></div></div>' +
        mediaHtml +
        '<div class="main">' + esc(item.text) + '</div>' +
        (item.subText ? '<div class="sub">' + esc(item.subText) + '</div>' : '') +
        (item.diamonds > 0
          ? '<div class="pill">💎 ' + Number(item.diamonds).toLocaleString('en-US') + '</div>'
          : '');

      // รูปโหลดพัง → สลับเป็น emoji แทน (เช่น CDN บล็อก)
      var img = card.querySelector('img.media');
      if (img) {
        img.addEventListener('error', function () {
          var d = document.createElement('div');
          d.className = 'media emoji';
          d.textContent = item.icon || '🔔';
          img.replaceWith(d);
        });
      }

      stageEl.appendChild(card);
      return { card: card, accent: a };
    }

    // ---- ระบบคิว: แสดงทีละใบ ----
    var queue = [];
    var busy = false;
    var hiding = false;
    var shownAt = 0;
    var hideTimer = null;
    var advanceTimer = null;
    var gapTimer = null;   // ช่องว่างระหว่างใบ — ระหว่างนี้ busy ยังเป็น true กัน next() ซ้อน
    var currentCard = null;

    function enqueue(item) {
      queue.push(item);
      while (queue.length > 50) queue.shift(); // กันคิวบวมตอนโดนถล่ม
      // ห้ามเรียก next() ตรงๆ ระหว่างรอ gap — เดิมทำให้ next() ยิงซ้อน 2 ทาง
      // (จาก enqueue + จาก timer ของ finish) จนการ์ดโผล่ 2 ใบและใบแรกค้างไม่หาย
      if (!busy && !gapTimer) next();
      else scheduleAdvance();
    }

    // มีคิวรอ → ตัดจบใบปัจจุบันทันทีที่ครบ 2.5 วิ เพื่อเล่นต่อเนื่อง
    function scheduleAdvance() {
      if (!busy || hiding || !currentCard || !queue.length || advanceTimer) return;
      var wait = Math.max(0, MIN_MS - (Date.now() - shownAt));
      advanceTimer = setTimeout(function () {
        advanceTimer = null;
        hide();
      }, wait);
    }

    function next() {
      var item = queue.shift();
      if (!item) return;
      busy = true;
      hiding = false;
      shownAt = Date.now();

      var r = render(item);
      currentCard = r.card;
      playSound(item);
      if (item.big) burstConfetti(r.accent);

      var durSec = item.durationSec > 0 ? item.durationSec : defaults.durationSec;
      hideTimer = setTimeout(hide, Math.max(MIN_MS, durSec * 1000));
      if (queue.length) scheduleAdvance();
    }

    function hide() {
      if (!busy || hiding) return;
      hiding = true;
      if (hideTimer) { clearTimeout(hideTimer); hideTimer = null; }
      if (advanceTimer) { clearTimeout(advanceTimer); advanceTimer = null; }

      var card = currentCard;
      if (!card) { finish(); return; }
      var done = false;
      var finishOnce = function () {
        if (done) return;
        done = true;
        card.remove();
        finish();
      };
      card.addEventListener('animationend', function (e) {
        if (e.target === card && e.animationName === 'cardOut') finishOnce();
      });
      card.classList.add('out');
      setTimeout(finishOnce, OUT_MS + 200); // เผื่อ animationend ไม่ยิง
    }

    function finish() {
      currentCard = null;
      hiding = false;
      // คง busy = true ตลอดช่วง gap — enqueue ที่เข้ามาระหว่างนี้จะไม่แซงเรียก next() เอง
      if (gapTimer) clearTimeout(gapTimer);
      gapTimer = setTimeout(function () {
        gapTimer = null;
        busy = false;
        if (queue.length) next();
      }, GAP_MS);
    }

    // ---- แปลง event → รายการแจ้งเตือน ----
    function onTikTokEvent(event, data) {
      if (!data) return;
      var name = data.nickname || data.uniqueId || 'ผู้ชม';
      var handle = data.uniqueId ? '@' + data.uniqueId : '';

      if (event === 'gift') {
        if (!showGifts || data.repeatEnd !== true) return; // นับเฉพาะจบคอมโบ
        var repeat = Number(data.repeatCount) || 1;
        var total = Number(data.diamondTotal);
        if (!isFinite(total) || total <= 0) total = (Number(data.diamondCount) || 0) * repeat;
        if (total < defaults.minDiamonds) return;
        enqueue({
          text: name + ' ส่ง ' + (data.giftName || 'ของขวัญ') + ' x' + repeat,
          subText: handle,
          imageUrl: data.giftPictureUrl || data.profilePictureUrl || '',
          avatar: !data.giftPictureUrl,
          diamonds: total,
          big: total >= 100, // confetti
          icon: '🎁'
        });
      } else if (event === 'follow') {
        if (!showFollows) return;
        enqueue({ text: name + ' กดติดตาม ✨', subText: handle, imageUrl: data.profilePictureUrl || '', avatar: true, icon: '✨' });
      } else if (event === 'subscribe') {
        if (!showSubs) return;
        enqueue({ text: name + ' สมัครสมาชิก 🌟', subText: handle, imageUrl: data.profilePictureUrl || '', avatar: true, icon: '🌟' });
      } else if (event === 'share') {
        if (!showShares) return;
        enqueue({ text: name + ' แชร์ไลฟ์ 📣', subText: handle, imageUrl: data.profilePictureUrl || '', avatar: true, icon: '📣' });
      }
    }

    // ---- เชื่อมต่อ WebSocket ----
    var dotEl = document.getElementById('wsdot');
    var ws = TikkiesWidget.connect({
      onOpen: function () { dotEl.classList.add('on'); },
      onClose: function () { dotEl.classList.remove('on'); },
      onEvent: function (event, data) {
        if (event === 'snapshot') {
          // ตั้งค่าเริ่มต้นจาก snapshot ตอนเชื่อมต่อสำเร็จ
          var ov = data && data.settings && data.settings.overlay;
          if (!ov) return;
          var d = Number(ov.alertDurationSec);
          if (!durLocked && isFinite(d) && d > 0) defaults.durationSec = d;
          var m = Number(ov.alertMinDiamonds);
          if (!minLocked && isFinite(m) && m >= 0) defaults.minDiamonds = m;
          if (!accentLocked && ov.accentColor && HEX.test(ov.accentColor)) defaults.accent = ov.accentColor;
          return;
        }
        if (event === 'alert') {
          // จากระบบ Actions — แสดงเสมอ ไม่กรอง
          if (!data || !data.text) return;
          enqueue({
            text: String(data.text),
            subText: data.subText ? String(data.subText) : '',
            imageUrl: data.imageUrl || '',
            soundUrl: data.soundUrl || '',
            durationSec: Number(data.durationSec) || 0,
            accent: data.accentColor || '',
            icon: '🔔'
          });
          return;
        }
        onTikTokEvent(event, data);
      }
    });

    // ---- โหมด debug: ปุ่มยิง event ทดสอบผ่าน WS ----
    if (debugOn) {
      document.getElementById('debug').classList.add('show');
      document.getElementById('btn-gift').addEventListener('click', function () {
        ws.send({ cmd: 'simulate', type: 'gift', overrides: { giftName: 'Rose', repeatCount: 3 } });
      });
      document.getElementById('btn-big').addEventListener('click', function () {
        ws.send({ cmd: 'simulate', type: 'gift', overrides: { giftName: 'Galaxy' } });
      });
      document.getElementById('btn-follow').addEventListener('click', function () {
        ws.send({ cmd: 'simulate', type: 'follow' });
      });
    }
  })();
  </script>
</body>
</html>
